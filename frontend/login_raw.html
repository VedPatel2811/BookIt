<body class="bg-background text-on-background overflow-hidden">
<div class="flex min-h-screen w-full relative">
<!-- Light Leaks -->
<div class="light-leak top-[-10%] left-[-10%]"></div>
<div class="light-leak bottom-[-20%] right-[10%]"></div>

<div class="absolute top-12 left-12 z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary-container rounded-xl flex items-center justify-center neon-glow">

</div>

</div>
</div>

<div class="glass-panel p-8 rounded-[2rem] max-w-lg">
<p class="text-2xl font-headline font-medium text-white leading-tight mb-4">
                        "The intersection of luxury architecture and digital precision."
                    </p>
<div class="flex items-center gap-3">
<div class="h-[1px] w-8 bg-primary"></div>
<span class="text-sm font-label tracking-widest text-primary uppercase">Curated Estates</span>
</div>
</div>
</div>
</div>

<div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 md:p-24 z-10">
<div class="w-full max-w-md">
<div class="mb-10">
<h1 class="text-4xl md:text-5xl font-headline font-extrabold tracking-tight text-white mb-3">
                        Welcome Back
                    </h1>
<p class="text-on-surface-variant font-body">Access your exclusive portfolio and concierge services.</p>
</div>
<form class="space-y-6">
<!-- Email/Mobile Input -->
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant ml-1">Identity</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-0 focus:outline-none transition-all duration-300" placeholder="Email or Mobile" type="text"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-500 opacity-50"></div>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Security</label>
<a class="text-xs font-label text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-0 focus:outline-none transition-all duration-300" placeholder="••••••••" type="password"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-500 opacity-50"></div>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container font-headline font-bold text-lg py-4 rounded-xl transition-all duration-300 transform active:scale-95 neon-glow" type="submit">

                    </button>
</form>

<div class="h-[1px] flex-1 bg-outline-variant/30"></div>

<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
